{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Movie List</title>
<link rel="stylesheet" href="{% static 'dvdrental_prediction/css/mystyle.css' %}">
<style>
    body { text-align: center; background-color: #ffe6f0; }
    table { margin: 0 auto; border-collapse: collapse; }
    h1 { color: #e75480; }
</style>
</head>
<body>

<h1>Movie List</h1>
<a href="{% url 'home' %}">Go back to home</a><br>

<form method="get" action="{% url 'search_result' %}">
    {{ form.as_p }}
    <button type="submit">Search</button>
</form>

<table border="1">
<tr>
    <th>ID</th><th>Title</th><th>Release Year</th><th>Rating</th><th>Language</th><th>Detail</th>
</tr>
{% for movie in movies %}
<tr>
    <td>{{ movie.film_id }}</td>
    <td>{{ movie.title }}</td>
    <td>{{ movie.release_year }}</td>
    <td>{{ movie.rating }}</td>
    <td>{{ movie.language.name }}</td>
    <td><a href="{% url 'movie_detail' film_id=movie.film_id %}">Details</a></td>
</tr>
{% endfor %}
</table>

</body>
</html>
